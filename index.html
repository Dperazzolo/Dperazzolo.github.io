document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    const mobileStyle = '<style id="dp-mobile-fixes">' +

      '}' +
      '@media (max-width: 560px){' +
      '.wrap{padding-left:16px!important;padding-right:16px!important;}' +
      'section{padding:58px 0!important;}' +
      '.nav-inner{height:60px!important;gap:8px!important;}' +
      '.brand{min-width:0!important;font-size:14px!important;gap:8px!important;}' +
      '.brand .dot-role{display:none!important;}' +
      'nav.links{inset:60px 0 auto 0!important;padding:12px 16px 16px!important;}' +
      '.lang{padding:2px!important;}' +
      '.lang button{padding:5px 6px!important;}' +
      '.menu-toggle{width:38px!important;height:36px!important;}' +
      '.nav-book{padding:9px 10px!important;}' +
      '.nav-book span{display:none!important;}' +
      '.eyebrow,.sec-eyebrow{letter-spacing:1.6px!important;gap:8px!important;}' +
      'h1.hero-title{font-size:clamp(2rem,12.5vw,3rem)!important;}' +
      'h2.sec-title{font-size:clamp(1.55rem,8vw,2.05rem)!important;}' +
      '.sec-head{margin-bottom:34px!important;}' +
      '.btn{width:100%!important;justify-content:center!important;padding:12px 16px!important;}' +
      '.contact{border-radius:18px!important;padding:32px 18px!important;}' +
      '.booking-box{border-radius:18px!important;}' +
      '.booking-ready{padding:32px 18px!important;}' +
      '.bkmodal-body{min-height:0!important;}' +
      '}' +
      '</style>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + mobileStyle + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg>diegoperazzolo8@gmail.com<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/diego-perazzolo-b7349319b/\" target=\"_blank\" rel=\"noopener\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M4.98 3.5C4.98 4.88 3.87 6 2.5 6S.02 4.88.02 3.5 1.13 1 2.5 1s2.48 1.12 2.48 2.5zM.24 8.25h4.52V23H.24V8.25zM8.34 8.25h4.33v2.01h.06c.6-1.14 2.08-2.34 4.28-2.34 4.58 0 5.42 3.01 5.42 6.92V23h-4.52v-7.06c0-1.68-.03-3.85-2.35-3.85-2.35 0-2.71 1.83-2.71 3.73V23H8.34V8.25z\"><\u002Fpath><\u002Fsvg>LinkedIn<\u002Fa>\n          <a href=\"https://github.com/Dperazzolo\" target=\"_blank\" rel=\"noopener\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.19 1.76 1.19 1.03 1.76 2.69 1.25 3.35.96.1-.75.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.42-2.7 5.39-5.27 5.68.41.35.78 1.05.78 2.13 0 1.54-.01 2.78-.01 3.16 0 .3.2.67.8.55A10.52 10.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z\"><\u002Fpath><\u002Fsvg>GitHub<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"hero-meta\">\n          <span><i class=\"pip\"><\u002Fi> <span data-l=\"en\">PhD, University of Padua<\u002Fspan><span data-l=\"it\">PhD, Università di Padova<\u002Fspan><\u002Fspan>\n          <span><i class=\"pip\"><\u002Fi> <span data-l=\"en\">Healthcare &amp; life-science data<\u002Fspan><span data-l=\"it\">Bioinformatica, Dati sanitari e life-science<\u002Fspan><\u002Fspan>\n          <span><i class=\"pip\"><\u002Fi> <span data-l=\"en\">On-prem / GDPR-first AI<\u002Fspan><span data-l=\"it\">Europe - AI act / GDPR-first<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"wrap\">\n    <div class=\"about-grid reveal\">\n      <div class=\"about-body\">\n        <div class=\"sec-eyebrow\"><span class=\"num\">01<\u002Fspan><span data-l=\"en\">About<\u002Fspan><span data-l=\"it\">Chi sono<\u002Fspan><\u002Fdiv>\n        <h2 class=\"sec-title\"><span data-l=\"en\">From clinical research to production ML<br><\u002Fspan><span data-l=\"it\">Dalla ricerca clinica al ML in produzione<br><\u002Fspan><\u002Fh2>\n        <p><span data-l=\"en\">During my PhD at the <strong>University of Padua<\u002Fstrong>, I worked at the intersection of machine learning and biomedical research: predictive and generative models for complex clinical, genetic, and pharmacometric data. Years working with real datasets taught me where models bring value and where they can fit in.<\u002Fspan><span data-l=\"it\">Durante il mio dottorato presso l'<strong>Università di Padova,&nbsp;<\u002Fstrong><span style=\"font-size: 16.96px; letter-spacing: 0.2px;\">ho lavorato&nbsp;<\u002Fspan>all'incrocio tra machine learning e ricerca biomedica: modelli predittivi e generativi per dati clinici, genetici e farmacometrici complessi. Anni su dataset reali mi hanno insegnato dove i modelli portano valore e dove si possono inserire.<\u002Fspan><\u002Fp>\n        <p><span data-l=\"en\">Today I run an independent AI consulting practice together with two colleagues. We help organizations <strong>adopt AI-based systems without the usual technical overhead.<\u002Fstrong> From hands-on AI integration to a bespoke model built for your specific needs in research, data analysis, and automation.<\u002Fspan><span data-l=\"it\">Oggi porto avanti una pratica di consulenza AI indipendente insieme a due colleghi. Aiutiamo le organizzazioni ad <strong>adottare sistemi basati su AI senza il solito sovraccarico tecnico.<\u002Fstrong><span style=\"font-size: 16.96px; letter-spacing: 0.2px;\">&nbsp;Dall'integrazione pratica dell'AI al modello ad-hoc specifico per le tue esigenze di ricerca, analisi dati e automazione.<\u002Fspan><\u002Fspan><\u002Fp>\n        <p><span data-l=\"en\"><\u002Fspan><span data-l=\"it\"><\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <aside class=\"about-card\">\n        <h4><span data-l=\"en\">Profile<\u002Fspan><span data-l=\"it\">Profilo<\u002Fspan><\u002Fh4>\n        <div class=\"fact\"><span class=\"k\"><span data-l=\"en\">Based in<\u002Fspan><span data-l=\"it\">Sede<\u002Fspan><\u002Fspan><span class=\"v\"><span data-l=\"en\">Verona area, Italy (working remotely)<small>International collaborations<br><\u002Fsmall><\u002Fspan><span data-l=\"it\">Verona e dintorni, Italia (da remoto)<small>Collaborazioni internazionali<\u002Fsmall><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"fact\"><span class=\"k\"><span data-l=\"en\">Role<\u002Fspan><span data-l=\"it\">Ruolo<\u002Fspan><\u002Fspan><span class=\"v\"><span data-l=\"en\">Freelance AI / ML specialist<small>Consulting · development · training<\u002Fsmall><\u002Fspan><span data-l=\"it\">Specialista AI / ML freelance<small>Consulenza · sviluppo · formazione<\u002Fsmall><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"fact\"><span class=\"k\"><span data-l=\"en\">Background<\u002Fspan><span data-l=\"it\">Formazione<\u002Fspan><\u002Fspan><span class=\"v\"><span data-l=\"en\">PhD — biomedical machine learning<small>University of Padua<\u002Fsmall><\u002Fspan><span data-l=\"it\">Dottorato — machine learning biomedico<small>Università di Padova<\u002Fsmall><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"fact\"><span class=\"k\"><span data-l=\"en\">Works with<\u002Fspan><span data-l=\"it\">Con chi<\u002Fspan><\u002Fspan><span class=\"v\"><span data-l=\"en\">Research centers · SMEs · public bodies<\u002Fspan><span data-l=\"it\">Centri di ricerca · PMI · enti pubblici<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"fact\"><span class=\"k\"><span data-l=\"en\">Languages<\u002Fspan><span data-l=\"it\">Lingue<\u002Fspan><\u002Fspan><span class=\"v\"><span data-l=\"en\">Italian (native) · English<\u002Fspan><span data-l=\"it\">Italiano (madrelingua) · Inglese<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROJECTS -->\n<section id=\"projects\" class=\"alt\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <div class=\"sec-eyebrow\"><span class=\"num\">02<\u002Fspan><span data-l=\"en\">Solutions<\u002Fspan><span data-l=\"it\">Soluzioni<\u002Fspan><\u002Fdiv>\n      <h2 class=\"sec-title\"><span data-l=\"en\">Between research and application<\u002Fspan><span data-l=\"it\">Tra ricerca e applicazione<\u002Fspan><\u002Fh2>\n      <p><span data-l=\"en\">Drawing on the experience I built in academia, I strongly believe in bringing research and real-world application together.<br><\u002Fspan><span data-l=\"it\">Sfruttando l'esperienza maturata in ambito accademico, credo fortemente nell'integrazione e collaborazione tra ricerca e applicazione. <br><\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cards-3\">\n      <div class=\"svc reveal\">\n        <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 3v4M12 17v4M3 12h4M17 12h4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n        <div class=\"idx\"><span data-l=\"en\">consulting<\u002Fspan><span data-l=\"it\">consulenza<\u002Fspan><\u002Fdiv>\n        <h3><span data-l=\"en\">Strategy &amp; feasibility<\u002Fspan><span data-l=\"it\">Strategia e fattibilità<\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Scoping, roadmaps, and a clear read on what's worth building. I help you tell the ML problems worth solving from the ones that only look that way — and pick the simplest approach that works.<\u002Fspan><span data-l=\"it\">Analisi, roadmap e una lettura chiara di cosa vale la pena costruire. Ti aiuto a distinguere i problemi di ML che vale la pena risolvere da quelli che sembrano soltanto tali, scegliendo l'approccio più semplice che funziona.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"svc reveal\">\n        <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M8 6l-5 6 5 6M16 6l5 6-5 6\"><\u002Fpath><\u002Fsvg>\n        <div class=\"idx\"><span data-l=\"en\">development<\u002Fspan><span data-l=\"it\">sviluppo<\u002Fspan><\u002Fdiv>\n        <h3><span data-l=\"en\">Custom ML development<\u002Fspan><span data-l=\"it\">Sviluppo ML su misura<\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">End-to-end systems: data pipelines, model training, evaluation, and deployment. Deep learning, time series, generative models, or classical ML — whatever the data actually calls for.<\u002Fspan><span data-l=\"it\">Sistemi end-to-end: pipeline dati, addestramento, valutazione e deploy. Deep learning, serie temporali, modelli generativi o ML classico, qualunque cosa richiedano i dati.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"svc reveal\">\n        <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M21 7v6M7 9.5V14c0 1.5 2.5 3 5 3s5-1.5 5-3V9.5\"><\u002Fpath><\u002Fsvg>\n        <div class=\"idx\"><span data-l=\"en\">training<\u002Fspan><span data-l=\"it\">formazione<\u002Fspan><\u002Fdiv>\n        <h3><span data-l=\"en\">Training &amp; workshops<\u002Fspan><span data-l=\"it\">Formazione e workshop<\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Hands-on sessions for teams and public organizations — from ML foundations to running capable models locally on your own hardware. Practical, code-first, tuned to your domain.<\u002Fspan><span data-l=\"it\">Sessioni pratiche per team ed enti pubblici: dalle basi dell' AI fino all'utilizzo pratico di LLM e i modelli più di frontiera, calate sul tuo dominio.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"svc reveal\">\n        <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"3.4\" r=\"1.3\"><\u002Fcircle><path d=\"M12 4.7V7\"><\u002Fpath><rect x=\"4.5\" y=\"7\" width=\"15\" height=\"12\" rx=\"3\"><\u002Frect><circle cx=\"9.5\" cy=\"13\" r=\"1.3\"><\u002Fcircle><circle cx=\"14.5\" cy=\"13\" r=\"1.3\"><\u002Fcircle><path d=\"M2.5 11.5v3M21.5 11.5v3\"><\u002Fpath><\u002Fsvg>\n        <div class=\"idx\"><span data-l=\"en\">automation<\u002Fspan><span data-l=\"it\">automazione<\u002Fspan><\u002Fdiv>\n        <h3><span data-l=\"en\">Automation &amp; physical AI<\u002Fspan><span data-l=\"it\">Automazione e physical AI<\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Automation and physical-AI systems for manufacturing and lab environments — from robotic setups to agents that run processes and experiments, so repetitive or delicate work runs on its own.<\u002Fspan><span data-l=\"it\">Sistemi di automazione e physical AI per ambienti manifatturieri e di laboratorio: da configurazioni specifiche&nbsp; ad agenti che gestiscono processi ed esperimenti, così il lavoro ripetitivo o delicato procede da solo.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <h3 style=\"font-family:'JetBrains Mono';font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--violet-2);margin:70px 0 24px;font-weight:400;\"><span data-l=\"en\">Areas &amp; examples<\u002Fspan><span data-l=\"it\">Ambiti ed esempi<\u002Fspan><\u002Fh3>\n    <div class=\"work-grid\">\n      <div class=\"work reveal\">\n        <h3><span class=\"bull\"><\u002Fspan><span><span data-l=\"en\">Time series &amp; forecasting<\u002Fspan><span data-l=\"it\">Serie temporali e forecasting<\u002Fspan><\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Analyzing large volumes of data and forecasting time series makes it possible to understand how a phenomenon will evolve over time — and to act before a problem arises.<\u002Fspan><span data-l=\"it\">L'analisi di grandi moli di dati e il forecasting di serie temporali permettono di comprendere come un fenomeno evolverà nel tempo — e di agire prima che una criticità si presenti.<\u002Fspan><\u002Fp>\n        <a class=\"work-ex\" href=\"https://www.vicenzareport.it/provincia/consorzio-arica-fa-un-passo-avanti-verso-il-futuro/\" target=\"_blank\" rel=\"noopener\">\n          <span class=\"ex-k\"><span data-l=\"en\">Example<\u002Fspan><span data-l=\"it\">Esempio<\u002Fspan><\u002Fspan>\n          <span class=\"ex-t\"><span data-l=\"en\">Forecasting for water utilities · I4 Consulting<\u002Fspan><span data-l=\"it\">Forecasting per utility idriche · I4 Consulting<\u002Fspan><\u002Fspan>\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"work reveal\">\n        <h3><span class=\"bull\"><\u002Fspan><span><span data-l=\"en\">Generative &amp; representation learning<\u002Fspan><span data-l=\"it\">Modelli generativi<\u002Fspan><\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Applying generative models produces synthetic data that helps overcome sample scarcity — preserving quality and privacy. The core of my published research.<\u002Fspan><span data-l=\"it\">L'applicazione di modelli generativi genera dati sintetici che aiutano a superare la scarsità di campioni — preservando qualità e riservatezza. Il cuore della mia ricerca pubblicata.<\u002Fspan><\u002Fp>\n        <a class=\"work-ex\" href=\"https://doi.org/10.48550/arXiv.2505.02514\" target=\"_blank\" rel=\"noopener\">\n          <span class=\"ex-k\"><span data-l=\"en\">Example<\u002Fspan><span data-l=\"it\">Esempio<\u002Fspan><\u002Fspan>\n          <span class=\"ex-t\"><span data-l=\"en\">Pharmacokinetics (PK/PD) · IEEE EMBC 2025<\u002Fspan><span data-l=\"it\">Farmacocinetica (PK/PD) · IEEE EMBC 2025<\u002Fspan><\u002Fspan>\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"work reveal\">\n        <h3><span class=\"bull\"><\u002Fspan><span><span data-l=\"en\">Bioinformatics &amp; life sciences<\u002Fspan><span data-l=\"it\">Bioinformatica e life sciences<\u002Fspan><\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Clinical, omics, and pharmacometric data — the field I trained in: predictive modeling and analysis, even on small and complex datasets.<\u002Fspan><span data-l=\"it\">Dati clinici, omici e farmacometrici — il campo in cui mi sono formato: modelli predittivi e analisi, anche su dataset piccoli e complessi.<\u002Fspan><\u002Fp>\n        <a class=\"work-ex\" href=\"https://ieeexplore.ieee.org/document/11254911\" target=\"_blank\" rel=\"noopener\">\n          <span class=\"ex-k\"><span data-l=\"en\">Example<\u002Fspan><span data-l=\"it\">Esempio<\u002Fspan><\u002Fspan>\n          <span class=\"ex-t\"><span data-l=\"en\">Omics classification · IEEE EMBC 2025<\u002Fspan><span data-l=\"it\">Classificazione omica · IEEE EMBC 2025<\u002Fspan><\u002Fspan>\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"work reveal\">\n        <h3><span class=\"bull\"><\u002Fspan><span><span data-l=\"en\">AI for automation<\u002Fspan><span data-l=\"it\">AI for automation<\u002Fspan><\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Physical AI and automation for manufacturing and lab settings — robotic systems and agents that carry out tasks and experiments on their own.<\u002Fspan><span data-l=\"it\">Physical AI e automazione per contesti manifatturieri e di laboratorio — sistemi robotici e agenti che eseguono compiti ed esperimenti in autonomia.<\u002Fspan><\u002Fp>\n        <a class=\"work-ex\" href=\"https://www.linkedin.com/feed/update/urn:li:activity:7472659369835302912/\" target=\"_blank\" rel=\"noopener\">\n          <span class=\"ex-k\"><span data-l=\"en\">Example<\u002Fspan><span data-l=\"it\">Esempio<\u002Fspan><\u002Fspan>\n          <span class=\"ex-t\"><span data-l=\"en\">Autonomous-lab prototype · HackRome<\u002Fspan><span data-l=\"it\">Prototipo di laboratorio autonomo · HackRome<\u002Fspan><\u002Fspan>\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"work reveal\">\n        <h3><span class=\"bull\"><\u002Fspan><span><span data-l=\"en\">Sovereign &amp; on-prem AI<\u002Fspan><span data-l=\"it\">AI sovrana e on-prem<\u002Fspan><\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">Beyond technical capability, being compliant with GDPR and the AI Act is essential for companies operating in Europe — so I build on-prem solutions and local models, where your data stays fully under your control.<\u002Fspan><span data-l=\"it\">Oltre all'applicabilità tecnica, essere compliant a GDPR e AI Act è fondamentale per le aziende sul territorio europeo — per questo sviluppo soluzioni on-prem e modelli locali, dove i dati restano sotto il tuo pieno controllo.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESEARCH -->\n<section id=\"research\" class=\"alt\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <div class=\"sec-eyebrow\"><span class=\"num\">04<\u002Fspan><span data-l=\"en\">Research<\u002Fspan><span data-l=\"it\">Ricerca<\u002Fspan><\u002Fdiv>\n      <h2 class=\"sec-title\"><span data-l=\"en\">Selected publications.<\u002Fspan><span data-l=\"it\">Pubblicazioni selezionate.<\u002Fspan><\u002Fh2>\n      <p><span data-l=\"en\">Peer-reviewed work in biomedical machine learning, generative models, and pharmacometrics — the foundation the consulting is built on.<\u002Fspan><span data-l=\"it\">Lavori peer-reviewed su machine learning biomedico, modelli generativi e farmacometria — le fondamenta su cui poggia la consulenza.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <div class=\"pub\"><span class=\"yr\">2025<\u002Fspan><div class=\"body\">\n        <h4>Transcriptomic profiling of cytomegalovirus infection in cardiac transplantation: proof-of-concept for a new strategy in tissue markers application<\u002Fh4>\n        <span class=\"venue\">Frontiers in Immunology · Journal Article<\u002Fspan>\n        <div class=\"auth\">Barison I., Perazzolo D., Castellani C., et al.<\u002Fdiv><\u002Fdiv>\n        <a class=\"link\" href=\"https://doi.org/10.3389/fimmu.2025.1581151\" target=\"_blank\" rel=\"noopener\">DOI<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fdiv>\n\n      <div class=\"pub\"><span class=\"yr\">2025<\u002Fspan><div class=\"body\">\n        <h4>Uncovering Population PK Covariates from VAE-Generated Latent Spaces<\u002Fh4>\n        <span class=\"venue\">IEEE EMBC 2025 · Conference Paper<\u002Fspan>\n        <div class=\"auth\">Perazzolo D., Castellani C., Grisan E.<\u002Fdiv><\u002Fdiv>\n        <a class=\"link\" href=\"https://doi.org/10.48550/arXiv.2505.02514\" target=\"_blank\" rel=\"noopener\">arXiv<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fdiv>\n\n      <div class=\"pub\"><span class=\"yr\">2025<\u002Fspan><div class=\"body\">\n        <h4>Improving Omics-Based Classification: The Role of Feature Selection and Synthetic Data Generation<\u002Fh4>\n        <span class=\"venue\">IEEE EMBC 2025 · Conference Paper<\u002Fspan>\n        <div class=\"auth\">Perazzolo D., Fanton P., Barison I., Fedrigo M., Angelini A., Castellani C., Grisan E.<\u002Fdiv><\u002Fdiv>\n        <a class=\"link\" href=\"https://doi.org/10.48550/arXiv.2505.03387\" target=\"_blank\" rel=\"noopener\">arXiv<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fdiv>\n\n      <div class=\"pub\"><span class=\"yr\">2025<\u002Fspan><div class=\"body\">\n        <h4>The Value of Systematic Study and Biobanking of Explanted Hearts: Insights from an International ISHLT Pathology Survey<\u002Fh4>\n        <span class=\"venue\">J. of Heart and Lung Transplantation · Brief Communication<\u002Fspan>\n        <div class=\"auth\">Fedrigo M., Perazzolo D., Berry G., Angelini A.<\u002Fdiv><\u002Fdiv>\n        <a class=\"link\" href=\"https://doi.org/10.1016/j.jhlto.2025.100306\" target=\"_blank\" rel=\"noopener\">DOI<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fdiv>\n\n      <div class=\"pub\"><span class=\"yr\">2025<\u002Fspan><div class=\"body\">\n        <h4>Streamflow Forecasting: A Comparative Analysis of ARIMAX, Rolling-Forecast LSTM and Physical-Based Models in an Italian Natural Catchment<\u002Fh4>\n        <span class=\"venue\">Water (MDPI) · Journal Article<\u002Fspan>\n        <div class=\"auth\">Perazzolo D., Lazzaro G., Fiume A., Fanton P., Grisan E.<\u002Fdiv><\u002Fdiv>\n        <a class=\"link\" href=\"https://doi.org/10.3390/w17152341\" target=\"_blank\" rel=\"noopener\">DOI<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"research-more reveal\">\n      <a href=\"https://github.com/Dperazzolo\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-ghost\"><span data-l=\"en\">Full list &amp; code on GitHub<\u002Fspan><span data-l=\"it\">Elenco completo e codice su GitHub<\u002Fspan>\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BOOKING -->\n<section id=\"book\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <div class=\"sec-eyebrow\"><span class=\"num\">05<\u002Fspan><span data-l=\"en\">Book a call<\u002Fspan><span data-l=\"it\">Prenota una call<\u002Fspan><\u002Fdiv>\n      <h2 class=\"sec-title\"><span data-l=\"en\">Book a 20-minute intro call.<\u002Fspan><span data-l=\"it\">Prenota una prima call di 20 minuti.<\u002Fspan><\u002Fh2>\n      <p><span data-l=\"en\">Pick a free slot for a first, totally <b style=\"color: rgb(250, 247, 242);\">free<\u002Fb> 20-minute meeting. We can talk through your needs together!<\u002Fspan><span data-l=\"it\">Scegli uno slot libero per un primo incontro di 20 minuti totalmente <b style=\"color: rgb(250, 247, 242);\"><b>gratuito.<br><\u002Fb><\u002Fb>Possiamo discutere assieme le necessità!<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"booking-box reveal\">\n      <div class=\"booking-ready\">\n        <svg class=\"cal-ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"3\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><path d=\"M9 15l2 2 4-4\" stroke=\"var(--teal)\"><\u002Fpath><\u002Fsvg>\n        <h3><span data-l=\"en\">Find a time that works<\u002Fspan><span data-l=\"it\">Trova un orario che funziona<\u002Fspan><\u002Fh3>\n        <p><span data-l=\"en\">A short, no-strings call to talk about your data and whether AI and ML can help. First calls are capped at 20 minutes on purpose — enough to know if it's worth going deeper.<\u002Fspan><span data-l=\"it\">Una call breve e senza impegno per parlare dei tuoi dati e capire se AI e ML può aiutarti. Le prime call durano al massimo 20 minuti, apposta: bastano per capire se vale la pena approfondire.<\u002Fspan><\u002Fp>\n        <button class=\"btn btn-primary\" id=\"bk-open-btn\"><span data-l=\"en\">Pick a time<\u002Fspan><span data-l=\"it\">Scegli un orario<\u002Fspan>\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"privacy\"><span data-l=\"en\">Synced live with my calendar · only free slots are shown<\u002Fspan><span data-l=\"it\">Sincronizzato live col mio calendario · solo gli slot liberi sono visibili<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact-sec\">\n  <div class=\"wrap\">\n    <div class=\"contact reveal\">\n      <h2><span data-l=\"en\">Prefer email?<\u002Fspan><span data-l=\"it\">Preferisci una mail?<\u002Fspan><\u002Fh2>\n      <p><span data-l=\"en\">If a call feels like too much for now, a message works just as well. Tell me a little about what you're working on.<\u002Fspan><span data-l=\"it\">Se una call ti sembra troppo per ora, va benissimo anche un messaggio. Raccontami un po' cosa stai facendo.<\u002Fspan><\u002Fp>\n      <div class=\"links-row\">\n        <a class=\"btn btn-primary\" href=\"mailto:diegoperazzolo8@gmail.com\"><span data-l=\"en\">Email me<\u002Fspan><span data-l=\"it\">Scrivimi<\u002Fspan>\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6h16v12H4z\"><\u002Fpath><path d=\"M4 7l8 6 8-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"https://www.linkedin.com/in/diego-perazzolo-b7349319b/\" target=\"_blank\" rel=\"noopener\">LinkedIn<\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"https://github.com/Dperazzolo\" target=\"_blank\" rel=\"noopener\">GitHub<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"site\">\n  <div class=\"wrap foot-inner\">\n    <div class=\"c\">© <span id=\"year\">2026<\u002Fspan> Diego Perazzolo<span data-l=\"it\"><\u002Fspan><\u002Fdiv>\n    <nav>\n      <a href=\"#about\"><span data-l=\"en\">About<\u002Fspan><span data-l=\"it\">Chi sono<\u002Fspan><\u002Fa>\n      <a href=\"#projects\"><span data-l=\"en\">Solutions<\u002Fspan><span data-l=\"it\">Soluzioni<\u002Fspan><\u002Fa>\n      <a href=\"#research\"><span data-l=\"en\">Research<\u002Fspan><span data-l=\"it\">Ricerca<\u002Fspan><\u002Fa>\n      <a href=\"#book\"><span data-l=\"en\">Book a call<\u002Fspan><span data-l=\"it\">Prenota una call<\u002Fspan><\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"bkmodal\" id=\"bkmodal\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Book a call\">\n  <div class=\"bkmodal-scrim\" data-bkclose=\"\"><\u002Fdiv>\n  <div class=\"bkmodal-panel\">\n    <div class=\"bkmodal-head\">\n      <h3><span data-l=\"en\">Book an intro call<\u002Fspan><span data-l=\"it\">Prenota una prima call<\u002Fspan><\u002Fh3>\n      <span class=\"bkmodal-badge\">max 20 min<\u002Fspan>\n      <span class=\"bkmodal-note\"><span data-l=\"en\">Only free slots are shown<\u002Fspan><span data-l=\"it\">Solo gli slot liberi sono visibili<\u002Fspan><\u002Fspan>\n      <a class=\"bkmodal-open\" id=\"bk-open-tab\" href=\"#\" target=\"_blank\" rel=\"noopener\" title=\"Open in a new tab\" aria-label=\"Open in a new tab\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17L17 7M8 7h9v9\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <button class=\"bkmodal-close\" data-bkclose=\"\" aria-label=\"Close\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"bkmodal-body\">\n      <div class=\"bkmodal-loading\" id=\"bk-loading\">LOADING CALENDAR…<\u002Fdiv>\n      <iframe id=\"bk-iframe\" title=\"Booking calendar\" loading=\"lazy\"><\u002Fiframe>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;it&quot;],&quot;default&quot;:&quot;it&quot;,&quot;tsType&quot;:&quot;'en'|'it'&quot;,&quot;section&quot;:&quot;Site&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFA94D&quot;,&quot;options&quot;:[&quot;#FFA94D&quot;,&quot;#2A6FDB&quot;,&quot;#1F8A5B&quot;,&quot;#F4543A&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Site&quot;}}\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n\n  componentDidMount(){\n    const root = document.getElementById('site');\n    if(!root) return;\n\n    // accent color tweak\n    const accent = this.props.accentColor;\n    if(accent){\n      document.documentElement.style.setProperty('--teal', accent);\n      document.documentElement.style.setProperty('--teal-deep', accent);\n    }\n\n    /* ---- language ---- */\n    let stored = null;\n    try{ stored = localStorage.getItem('dp_lang'); }catch(e){}\n    const initial = stored || this.props.defaultLang || 'en';\n    const setLang = (lang) => {\n      root.dataset.lang = lang;\n      document.documentElement.lang = lang;\n      try{ localStorage.setItem('dp_lang', lang); }catch(e){}\n      root.querySelectorAll('.lang button').forEach(b =>\n        b.classList.toggle('active', b.getAttribute('data-lang') === lang));\n    };\n    root.querySelectorAll('.lang button').forEach(b =>\n      b.addEventListener('click', () => setLang(b.getAttribute('data-lang'))));\n    setLang(initial);\n\n    /* ---- mobile menu ---- */\n    const toggle = root.querySelector('.menu-toggle');\n    const menu = root.querySelector('#menu');\n    if(toggle && menu){\n      toggle.addEventListener('click', () => {\n        const open = menu.classList.toggle('open');\n        toggle.setAttribute('aria-expanded', open);\n      });\n      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => menu.classList.remove('open')));\n    }\n\n    /* ---- booking ---- */\n    const BOOKING_EMBED_URL = \"https://calendar.google.com/calendar/appointments/schedules/AcZssZ2_Mc2B-Q6hGP8dugsXMPK6XxLsJ0UVB0XTr0BfwGdeWDu0IU09XlzUC88LPTASKQ3Y91_GZQvk?gv=true\";\n    const bkmodal  = root.querySelector('#bkmodal');\n    const bkIframe = root.querySelector('#bk-iframe');\n    const bkLoad   = root.querySelector('#bk-loading');\n    const bkOpenTab= root.querySelector('#bk-open-tab');\n    const configured = () => BOOKING_EMBED_URL && BOOKING_EMBED_URL.trim() !== '';\n    const openBooking = () => {\n      if(!configured()) return;\n      bkLoad.style.opacity = '1';\n      bkOpenTab.href = BOOKING_EMBED_URL;\n      const sep = BOOKING_EMBED_URL.includes('?') ? '&' : '?';\n      bkIframe.src = BOOKING_EMBED_URL + sep + 'hl=' + (root.dataset.lang === 'it' ? 'it' : 'en');\n      bkIframe.onload = () => { bkLoad.style.opacity = '0'; };\n      setTimeout(() => { bkLoad.style.opacity = '0'; }, 2500);\n      bkmodal.classList.add('open');\n      document.body.style.overflow = 'hidden';\n    };\n    const closeBooking = () => {\n      bkmodal.classList.remove('open');\n      bkIframe.src = 'about:blank';\n      document.body.style.overflow = '';\n    };\n    bkmodal.querySelectorAll('[data-bkclose]').forEach(el => el.addEventListener('click', closeBooking));\n    root.querySelectorAll('a[href=\"#book\"]').forEach(a =>\n      a.addEventListener('click', e => { if(configured()){ e.preventDefault(); openBooking(); } }));\n    const openBtn = root.querySelector('#bk-open-btn');\n    if(openBtn) openBtn.addEventListener('click', openBooking);\n    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeBooking(); });\n\n    /* ---- year ---- */\n    const y = root.querySelector('#year');\n    if(y) y.textContent = new Date().getFullYear();\n\n    /* ---- scroll reveal ---- */\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n    }, { threshold: 0.12 });\n    root.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n    /* ---- hero latent manifold ---- */\n    this._initManifold();\n  }\n\n  _initManifold(){\n    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const canvas = document.getElementById('manifold');\n    if(!canvas) return;\n    const ctx = canvas.getContext('2d');\n    let W, H, DPR, nodes = [], mouse = { x:-999, y:-999 };\n    const TEAL=[255,169,77], VIOLET=[244,84,58];\n    const lerp = (a,b,t)=>`rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;\n\n    function initNodes(){\n      const density = Math.max(30, Math.min(80, Math.floor((W*H)/16000)));\n      nodes = [];\n      for(let i=0;i<density;i++) nodes.push({\n        x:Math.random()*W, y:Math.random()*H,\n        vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.2,\n        t:Math.random(), r:Math.random()*1.6+1.1\n      });\n    }\n    function resize(){\n      DPR = Math.min(window.devicePixelRatio||1, 2);\n      const r = canvas.getBoundingClientRect(); W=r.width; H=r.height;\n      canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); initNodes();\n    }\n    const LINK=130;\n    function draw(){\n      ctx.clearRect(0,0,W,H);\n      for(let i=0;i<nodes.length;i++){ const a=nodes[i];\n        for(let j=i+1;j<nodes.length;j++){ const b=nodes[j];\n          const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);\n          if(d<LINK){ const al=(1-d/LINK)*0.18;\n            ctx.strokeStyle=lerp(TEAL,VIOLET,(a.t+b.t)/2).replace('rgb','rgba').replace(')',`,${al})`);\n            ctx.lineWidth=0.7; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }\n        }\n      }\n      for(const n of nodes){\n        const mdx=n.x-mouse.x, mdy=n.y-mouse.y, md=Math.hypot(mdx,mdy);\n        if(md<110){ const f=(1-md/110)*0.55; n.x+=(mdx/(md||1))*f; n.y+=(mdy/(md||1))*f; }\n        n.x+=n.vx; n.y+=n.vy;\n        if(n.x<-20)n.x=W+20; if(n.x>W+20)n.x=-20; if(n.y<-20)n.y=H+20; if(n.y>H+20)n.y=-20;\n        const c=lerp(TEAL,VIOLET,n.t);\n        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);\n        ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;\n      }\n      requestAnimationFrame(draw);\n    }\n    function staticFrame(){ initNodes(); ctx.clearRect(0,0,W,H);\n      for(const n of nodes){ const c=lerp(TEAL,VIOLET,n.t);\n        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fillStyle=c; ctx.globalAlpha=.8; ctx.fill(); ctx.globalAlpha=1; } }\n    window.addEventListener('resize', resize);\n    window.addEventListener('mousemove', e => { const r=canvas.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });\n    window.addEventListener('mouseleave', () => { mouse.x=-999; mouse.y=-999; });\n    resize();\n    if(prefersReduced) staticFrame(); else draw();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
